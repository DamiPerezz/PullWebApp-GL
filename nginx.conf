# ==============================================
# NGINX Configuration for Pull Web App
# OPTIMIZED FOR MAXIMUM PERFORMANCE
# ==============================================

# Run as nginx user
user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with timing
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ===========================================
    # PERFORMANCE: Core Settings
    # ===========================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Buffer sizes
    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 8m;
    large_client_header_buffers 4 32k;

    # ===========================================
    # PERFORMANCE: Gzip Compression
    # ===========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ===========================================
    # PERFORMANCE: Brotli Compression (if module available)
    # ===========================================
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript
    #              application/json application/javascript application/xml
    #              application/xml+rss image/svg+xml;

    # ===========================================
    # SECURITY: Headers
    # ===========================================
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ===========================================
    # SSL Settings (uncomment in production)
    # ===========================================
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_prefer_server_ciphers on;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 1d;
    # ssl_session_tickets off;

    # ===========================================
    # SERVER CONFIGURATION
    # ===========================================
    server {
        listen 80;
        listen [::]:80;
        server_name pullevents.com www.pullevents.com;

        root /usr/share/nginx/html;
        index index.html;

        # ===========================================
        # PERFORMANCE: Static Asset Caching
        # ===========================================

        # Hashed assets (JS, CSS) - cache forever
        location ~* \.(?:js|css)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;

            # Serve pre-compressed files if available
            gzip_static on;
            brotli_static on;
        }

        # Images and fonts - long cache
        location ~* \.(?:jpg|jpeg|png|gif|webp|avif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 6M;
            add_header Cache-Control "public";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # JSON and other data files
        location ~* \.(?:json|xml)$ {
            expires 1h;
            add_header Cache-Control "public";
        }

        # Service worker - no cache
        location = /sw.js {
            expires off;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        }

        # Manifest - short cache
        location = /manifest.json {
            expires 1d;
            add_header Cache-Control "public";
        }

        # ===========================================
        # SPA: All routes to index.html
        # ===========================================
        location / {
            try_files $uri $uri/ /index.html;

            # HTML - no cache for SPA shell
            location ~* \.html$ {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
                add_header Pragma "no-cache";
            }
        }

        # ===========================================
        # SECURITY: Block sensitive files
        # ===========================================
        location ~ /\. {
            deny all;
        }

        location ~* \.(env|git|gitignore|htaccess|htpasswd)$ {
            deny all;
        }

        # ===========================================
        # Error Pages
        # ===========================================
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # ===========================================
    # HTTPS Server (uncomment in production)
    # ===========================================
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name pullevents.com www.pullevents.com;
    #
    #     ssl_certificate /etc/ssl/certs/pullevents.com.pem;
    #     ssl_certificate_key /etc/ssl/private/pullevents.com.key;
    #
    #     # ... same location blocks as above ...
    # }

    # ===========================================
    # HTTP to HTTPS Redirect (uncomment in production)
    # ===========================================
    # server {
    #     listen 80;
    #     server_name pullevents.com www.pullevents.com;
    #     return 301 https://$server_name$request_uri;
    # }
}
